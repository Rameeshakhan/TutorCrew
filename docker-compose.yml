version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutorcrew-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data
      - uploads:/tmp/tutorcrew_uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tutorcrew-ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
  uploads:
